<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Crapcraft.nz</title>
    
    <link rel="icon" type="image/x-icon" href="https://cdn.crapcraft.nz/u/favicon.ico">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <a href="https://crapcraft.nz">
        <img src="https://cdn.crapcraft.nz/raw/5HyVtn.png" alt="logo">
    </a>
    <div class="header-front-text">
        <h1>Crapcraft.nz</h1>
        <p>A simple homelab with useful services (website is work in progress)</p>
    </div>
</header>
<ul class="topnav">
  <li><a href="/privacy">Privacy/TOS</a></li>
  <li><a href="/contact">Contact</a></li>
  <li><a href="/about">About</a></li>
</ul>
<main>
    <article>
        <h1>Jellyfin Stats</h1>
        <p>Movies: <span id="movie-count">...</span></p>
        <p>Episodes: <span id="series-count">...</span></p>
        <p>Songs: <span id="song-count">...</span></p>
    </article>
    <nav>
        <h2>Links</h2>
            <a href="https://jellyfin.crapcraft.nz">
                <img src="https://cdn.crapcraft.nz/u/jellyfin.png" style="width:42px;height:42px;">
            </a>
            <a href="https://seerr.crapcraft.nz">
                <img src="https://cdn.crapcraft.nz/u/seerr.png" style="width:42px;height:42px;">
            </a>
            <a href="https://ai.crapcraft.nz">
                <img src="https://cdn.crapcraft.nz/u/open-webui.png" style="width:42px;height:42px;">
            </a>
            <a href="https://searxng.crapcraft.nz">
                <img src="https://cdn.crapcraft.nz/u/searxng.png" style="width:42px;height:42px;">
            </a>
            <a href="https://fmd.crapcraft.nz">
                <img src="https://cdn.crapcraft.nz/u/fmd.png" style="width:42px;height:42px;">
            </a>
            <a href="https://uptime.crapcraft.nz">
                <img src="https://cdn.crapcraft.nz/u/uptime-kuma.png" style="width:42px;height:42px;">
            </a>
    </nav>
</main>
<footer>
    <p><small>By using any crapcraft.nz service you agree to our Privacy Policy & Terms of Service.</small></p>
    <p><a href="https://crapcraft.nz/privacy">Privacy Policy/TOS</a></p>
</footer>
    <script>
        fetch('./stats.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById("movie-count").textContent = data.MovieCount
                document.getElementById("series-count").textContent = data.EpisodeCount
                document.getElementById("song-count").textContent = data.SongCount
            });
    </script>
</body>
</html>
